backend:
  name: git-gateway
  branch: main

media_folder: "public/images"
public_folder: "/images"

collections:
  - name: "live_data"
    label: "🔴 Live Stream Manager"
    description: "Yahan se aap apni website ki saari live streams, channels aur notices control kar sakte hain."
    files:
      - label: "⚙️ Main Website Data"
        name: "data"
        file: "public/data.json"
        fields:
          
          # --- GLOBAL SETTINGS ---
          - label: "🌐 Global Website Status (Live)"
            name: "isLive"
            widget: "boolean"
            default: true

          - label: "📢 Global Notice / Marquee Text"
            name: "title"
            widget: "string"

          # --- STREAMS LIST (CRUD) ---
          - label: "📺 All Streams (Matches)"
            name: "streams"
            widget: "list"
            label_singular: "Stream"
            collapsed: true
            summary: '📺 {{fields.videoTitle}} (Live: {{fields.isLive}})'
            fields:
              - { label: "📌 Video Title (Internal Name)", name: "videoTitle", widget: "string" }
              - { label: "🎥 Video ID (Optional)", name: "videoId", widget: "string", required: false }
              - { label: "🔴 Is This Stream Live?", name: "isLive", widget: "boolean", default: true }
              - { label: "🖼️ Active Thumbnail Name", name: "activeThumbnail", widget: "string", hint: "Neechay di gayi list mein se Thumbnail ka exact Name likhein (e.g. ipl)" }
              
              # --- THUMBNAILS (FULLY DYNAMIC CRUD) ---
              - label: "📸 Thumbnails Database"
                name: "thumbnailsList"
                widget: "list"   # <-- 'object' se 'list' kar diya gaya hai
                label_singular: "Thumbnail" # <-- "Add Thumbnail" ka button aayega
                collapsed: true
                summary: '🖼️ {{fields.name}}' # <-- Thumbnail ka naam bahar nazar aayega
                hint: "Naya thumbnail add karne ke liye 'Add Thumbnail' par click karein."
                fields:
                  - { label: "Thumbnail Name (Key)", name: "name", widget: "string", hint: "Bina spaces ke naam likhein, e.g., ipl, psl, worldcup" }
                  - { label: "Image URL", name: "url", widget: "string" }

              # --- CHANNELS LIST (CRUD) ---
              - label: "📡 Channels / Servers"
                name: "channels"
                widget: "list"
                label_singular: "Channel"
                collapsed: true
                summary: '📡 {{fields.name}}'
                fields:
                  - { label: "📝 Channel Name", name: "name", widget: "string" }
                  - { label: "🔗 Channel Video ID", name: "videoId", widget: "string" }














